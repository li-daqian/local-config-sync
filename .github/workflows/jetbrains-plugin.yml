name: JetBrains Plugin

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/jetbrains-plugin.yml"
      - "packages/jetbrains/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "package.json"
      - "scripts/summarize-plugin-verifier"
      - "scripts/test-summarize-plugin-verifier"
  pull_request:
    paths:
      - ".github/workflows/jetbrains-plugin.yml"
      - "packages/jetbrains/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "package.json"
      - "scripts/summarize-plugin-verifier"
      - "scripts/test-summarize-plugin-verifier"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native-cli:
    name: Native CLI (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-24.04
            executable: local-config
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            executable: local-config
          - target: darwin-amd64
            runner: macos-15-intel
            executable: local-config
          - target: darwin-arm64
            runner: macos-15
            executable: local-config
          - target: windows-amd64
            runner: windows-2025
            executable: local-config.exe
          - target: windows-arm64
            runner: windows-11-arm
            executable: local-config.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and run native CLI
        shell: bash
        run: |
          test "$(go env GOOS)-$(go env GOARCH)" = "${{ matrix.target }}"
          go build -trimpath -ldflags="-s -w -buildid=" -o "build/${{ matrix.executable }}" ./cmd/local-config
          "./build/${{ matrix.executable }}" --version

  verify:
    name: Build and verify
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify CI reporting scripts
        run: scripts/test-summarize-plugin-verifier

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Go core and CLI
        run: go vet ./... && go test ./...

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run plugin verification
        run: packages/jetbrains/gradlew -p packages/jetbrains -PallowIdeSdkDownload=true test verifyPluginProjectConfiguration verifyPluginStructure verifyPlugin

      - name: Summarize plugin verifier reports
        if: ${{ always() }}
        shell: bash
        run: |
          scripts/summarize-plugin-verifier \
            packages/jetbrains/build/reports/pluginVerifier \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --github-annotations

      - name: Upload plugin verifier reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: plugin-verifier-reports
          path: packages/jetbrains/build/reports/pluginVerifier
          if-no-files-found: warn

      - name: Upload plugin distribution
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: local-config-sync-jetbrains
          path: packages/jetbrains/build/distributions/*.zip
          if-no-files-found: error
