name: JetBrains Plugin

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/jetbrains-plugin.yml"
      - "packages/jetbrains/**"
      - "packages/core/**"
      - "packages/cli/**"
      - "scripts/bundle-cli.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
  pull_request:
    paths:
      - ".github/workflows/jetbrains-plugin.yml"
      - "packages/jetbrains/**"
      - "packages/core/**"
      - "packages/cli/**"
      - "scripts/bundle-cli.mjs"
      - "package.json"
      - "pnpm-lock.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Build and verify
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run plugin verification
        run: packages/jetbrains/gradlew -p packages/jetbrains -PallowIdeSdkDownload=true verifyPluginProjectConfiguration verifyPluginStructure verifyPlugin

      - name: Summarize plugin verifier reports
        if: ${{ always() }}
        shell: bash
        run: scripts/summarize-plugin-verifier packages/jetbrains/build/reports/pluginVerifier >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plugin verifier reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: plugin-verifier-reports
          path: packages/jetbrains/build/reports/pluginVerifier
          if-no-files-found: warn

      - name: Upload plugin distribution
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: local-config-sync-jetbrains
          path: packages/jetbrains/build/distributions/*.zip
          if-no-files-found: error
