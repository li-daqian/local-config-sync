name: JetBrains Plugin

on:
  push:
    branches: [main]
    tags:
      - "release-*"
    paths:
      - ".github/workflows/jetbrains-plugin.yml"
      - ".release/**"
      - "packages/jetbrains/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "package.json"
      - "scripts/summarize-plugin-verifier"
      - "scripts/test-summarize-plugin-verifier"
  pull_request:
    paths:
      - ".github/workflows/jetbrains-plugin.yml"
      - ".release/**"
      - "packages/jetbrains/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "package.json"
      - "scripts/summarize-plugin-verifier"
      - "scripts/test-summarize-plugin-verifier"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read

jobs:
  release_context:
    name: Resolve release scope
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.context.outputs.is_release }}
      version: ${{ steps.context.outputs.version }}
      channel: ${{ steps.context.outputs.channel }}
      jetbrains_release: ${{ steps.context.outputs.jetbrains_release }}
    steps:
      - name: Check out release
        if: ${{ github.ref_type == 'tag' }}
        uses: actions/checkout@v6

      - name: Set up Go
        if: ${{ github.ref_type == 'tag' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release manifest
        id: context
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "channel=" >> "$GITHUB_OUTPUT"
            echo "jetbrains_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          manifest_path=".release/manifests/$GITHUB_REF_NAME.yaml"
          if [[ ! -f "$manifest_path" ]]; then
            echo "Release manifest not found: $manifest_path" >&2
            exit 1
          fi

          go build -trimpath -o "$RUNNER_TEMP/release-manifest" ./cmd/release-manifest
          manifest_json="$("$RUNNER_TEMP/release-manifest" \
            --file "$manifest_path" \
            --tag "$GITHUB_REF_NAME" \
            --json)"
          version="$(jq -r '.artifacts.jetbrains.version // empty' <<< "$manifest_json")"
          channel="$(jq -r '.artifacts.jetbrains.channel // empty' <<< "$manifest_json")"
          jetbrains_release=false
          if [[ -n "$version" ]]; then
            jetbrains_release=true
          fi

          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "jetbrains_release=$jetbrains_release" >> "$GITHUB_OUTPUT"
          echo "Release manifest: $manifest_path" >> "$GITHUB_STEP_SUMMARY"
          echo "JetBrains release: $jetbrains_release" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$jetbrains_release" == "true" ]]; then
            echo "JetBrains version: $version" >> "$GITHUB_STEP_SUMMARY"
            echo "JetBrains channel: $channel" >> "$GITHUB_STEP_SUMMARY"
          fi

  native-cli:
    name: Native CLI (${{ matrix.target }})
    needs: release_context
    if: ${{ needs.release_context.outputs.jetbrains_release == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-24.04
            executable: local-config
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            executable: local-config
          - target: darwin-amd64
            runner: macos-15-intel
            executable: local-config
          - target: darwin-arm64
            runner: macos-15
            executable: local-config
          - target: windows-amd64
            runner: windows-2025
            executable: local-config.exe
          - target: windows-arm64
            runner: windows-11-arm
            executable: local-config.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and run native CLI
        shell: bash
        run: |
          test "$(go env GOOS)-$(go env GOARCH)" = "${{ matrix.target }}"
          go build -trimpath -ldflags="-s -w -buildid=" -o "build/${{ matrix.executable }}" ./cmd/local-config
          "./build/${{ matrix.executable }}" --version

  verify:
    name: Build and verify
    needs: release_context
    if: ${{ needs.release_context.outputs.jetbrains_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify CI reporting scripts
        run: scripts/test-summarize-plugin-verifier

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Go core and CLI
        run: go vet ./... && go test ./...

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run plugin verification
        env:
          RELEASE_PLUGIN_VERSION: ${{ needs.release_context.outputs.version }}
        run: |
          version_args=()
          if [[ -n "$RELEASE_PLUGIN_VERSION" ]]; then
            version_args+=("-PpluginVersion=$RELEASE_PLUGIN_VERSION")
          fi
          packages/jetbrains/gradlew -p packages/jetbrains \
            -PallowIdeSdkDownload=true \
            "${version_args[@]}" \
            test verifyPluginProjectConfiguration verifyPluginStructure verifyPlugin

      - name: Summarize plugin verifier reports
        if: ${{ always() }}
        shell: bash
        run: |
          scripts/summarize-plugin-verifier \
            packages/jetbrains/build/reports/pluginVerifier \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --github-annotations

      - name: Upload plugin verifier reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: plugin-verifier-reports
          path: packages/jetbrains/build/reports/pluginVerifier
          if-no-files-found: warn

      - name: Upload plugin distribution
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: local-config-sync-jetbrains
          path: packages/jetbrains/build/distributions/*.zip
          if-no-files-found: error

  publish:
    name: Publish to JetBrains Marketplace
    if: >-
      ${{ needs.release_context.outputs.is_release == 'true' &&
          needs.release_context.outputs.jetbrains_release == 'true' }}
    needs: [release_context, native-cli, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Sign and publish plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_PUBLISH_TOKEN }}
        run: |
          if [[ -z "$PUBLISH_TOKEN" ]]; then
            echo "Required GitHub Actions secret is missing: JETBRAINS_PUBLISH_TOKEN" >&2
            exit 1
          fi

          signing_dir="$RUNNER_TEMP/jetbrains-plugin-signing"
          mkdir -p "$signing_dir"

          PRIVATE_KEY_PASSWORD="$(openssl rand -hex 32)"
          export PRIVATE_KEY_PASSWORD
          echo "::add-mask::$PRIVATE_KEY_PASSWORD"

          openssl genpkey \
            -algorithm RSA \
            -aes-256-cbc \
            -pass env:PRIVATE_KEY_PASSWORD \
            -out "$signing_dir/private.pem" \
            -pkeyopt rsa_keygen_bits:4096

          openssl req \
            -new \
            -x509 \
            -sha256 \
            -days 365 \
            -subj "/CN=Local Config Sync CI" \
            -key "$signing_dir/private.pem" \
            -passin env:PRIVATE_KEY_PASSWORD \
            -out "$signing_dir/chain.crt"

          PRIVATE_KEY="$(<"$signing_dir/private.pem")"
          CERTIFICATE_CHAIN="$(<"$signing_dir/chain.crt")"
          export PRIVATE_KEY CERTIFICATE_CHAIN

          packages/jetbrains/gradlew -p packages/jetbrains \
            -PallowIdeSdkDownload=true \
            -PpluginVersion=${{ needs.release_context.outputs.version }} \
            -PpublishChannel=${{ needs.release_context.outputs.channel }} \
            publishPlugin

      - name: Upload signed plugin distribution
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: local-config-sync-jetbrains-${{ needs.release_context.outputs.version }}-signed
          path: packages/jetbrains/build/distributions/*-signed.zip
          if-no-files-found: error
